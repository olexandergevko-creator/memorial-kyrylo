<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кирило</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Manrope:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,400;1,500;1,600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111111;--surface-2:#1a1a1a;
  --accent:#c8a97e;--accent-dim:#8a7055;
  --text:#f0ede6;--text-muted:rgba(240,237,230,.6);
  --border:rgba(255,255,255,.08);
  --del:#c9594f;
  --slide-ms:4000
}
html,body{background:var(--bg);color:var(--text);
  font-family:'Manrope',sans-serif;overflow-x:hidden}
body{background:radial-gradient(ellipse 120% 90% at 50% 42%,#141414 0%,var(--bg) 58%,#060606 100%) fixed}
#app{position:relative;z-index:1}
#atmo{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='120' height='120' filter='url(%23n)'/></svg>");
  opacity:.04;mix-blend-mode:overlay}
.hidden{display:none!important}

/* ══ МЕМОРІАЛ (сторінка-наратив) ═════════════════════════════════════════════ */
#groups-view{position:relative}

/* — Вхід (hero) — */
#hero{min-height:100svh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:96px 24px 64px}
.hero-portrait-wrap{width:clamp(300px,42vw,420px);aspect-ratio:3/4;border-radius:4px;
  overflow:hidden;margin-bottom:30px;border:1px solid var(--border);
  box-shadow:0 24px 60px rgba(0,0,0,.6);animation:fadeUp 1.1s ease both}
#hero-portrait{width:100%;height:100%;object-fit:cover;filter:grayscale(.12) contrast(1.02)}
#m-tribute{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(1.6rem,3.6vw,2.6rem);color:var(--text);margin-top:34px;letter-spacing:.01em;
  animation:fadeUp 1.1s .15s ease both}
#m-tribute::after{content:'';display:block;width:44px;height:1px;
  background:var(--accent-dim);margin:22px auto 0}
#walk-all{margin-top:36px;cursor:pointer;background:transparent;
  border:1px solid var(--accent-dim);color:var(--accent);font-family:'Manrope',sans-serif;
  font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:13px 26px;
  border-radius:2px;transition:background 250ms,color 250ms,border-color 250ms;
  animation:fadeUp 1.1s .4s ease both}
#walk-all:hover{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
#scroll-cue{margin-top:46px;color:var(--text-muted);font-size:1.1rem;
  animation:cueBob 2.4s ease-in-out infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes cueBob{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(7px);opacity:.9}}

/* — Епохи (вертикальні смуги) — */
#epochs{display:flex;flex-direction:column;gap:14px;max-width:1100px;
  margin:0 auto;padding:24px 24px 8px}
.epoch{position:relative;display:block;width:100%;cursor:pointer;overflow:hidden;
  border-radius:4px;border:1px solid var(--border);background:var(--surface);
  height:clamp(180px,30vh,300px);text-align:left;
  transition:transform 500ms ease,box-shadow 500ms ease;
  animation:fadeUp .7s ease both;animation-delay:calc(var(--i,0)*70ms)}
.epoch.lg{height:clamp(260px,46vh,460px)}
.epoch:hover{transform:translateY(-3px);box-shadow:0 18px 44px rgba(0,0,0,.55)}
.epoch-cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  filter:brightness(.9);transition:transform 700ms ease,filter 500ms ease}
.epoch:hover .epoch-cover{transform:scale(1.04);filter:brightness(1)}
.epoch-scrim{position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to top,rgba(10,10,10,.9) 0%,rgba(10,10,10,.4) 44%,transparent 78%)}
.epoch-meta{position:absolute;left:0;right:0;bottom:0;padding:26px 30px;z-index:1}
.epoch-num{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;
  color:var(--accent);letter-spacing:.1em;margin-bottom:4px}
.epoch-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
  font-size:clamp(1.6rem,4vw,2.6rem);line-height:1.05;color:var(--text)}
.epoch-sub{font-size:.82rem;letter-spacing:.04em;color:rgba(240,237,230,.78);margin-top:7px}
.epoch.lg .epoch-title{font-size:clamp(2rem,5.4vw,3.4rem)}

/* — «Обличчя» (студійні портрети, окремий регістр) — */
#faces-block{max-width:1100px;margin:0 auto;padding:48px 24px 8px;text-align:center}
.block-title{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.9rem;color:var(--text)}
.block-sub{font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text-muted);margin-top:6px;margin-bottom:24px}
/* 12 портретів → рівний прямокутник без рваного ряду: 6×2 (десктоп) / 4×3 / 3×4 */
#faces-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:900px){#faces-grid{grid-template-columns:repeat(4,1fr)}}
.face{position:relative;aspect-ratio:3/4;overflow:hidden;border-radius:3px;cursor:pointer;
  background:var(--surface-2);border:1px solid var(--border)}
.face img{width:100%;height:100%;object-fit:cover;filter:grayscale(.15);
  transition:transform 500ms ease,filter 400ms ease}
.face:hover img{transform:scale(1.05);filter:grayscale(0)}

/* — Свічка (фінальний акорд: велике ціле відео + ім'я під ним) — */
#candle{min-height:100svh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:56px 16px;background:transparent}
#candle-frame{position:relative;aspect-ratio:1078/1442;height:min(80vh,118vw);max-width:92vw;
  border-radius:6px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.55)}
#candle-img,.candle-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#candle-img{opacity:.9;transform-origin:center 60%;
  animation:candleBreath 9s ease-in-out infinite,candleGlow 4.5s ease-in-out infinite}
.candle-media{z-index:1}
#candle-veil{position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 60% 54% at 50% 44%,transparent 0%,rgba(0,0,0,.42) 100%)}
@keyframes candleBreath{0%,100%{transform:scale(1.015)}50%{transform:scale(1.05)}}
@keyframes candleGlow{0%,100%{filter:brightness(.9) saturate(1)}45%{filter:brightness(1.08) saturate(1.12)}70%{filter:brightness(.97)}}
#candle-name{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.6rem;color:var(--text);margin-top:30px}
#candle-name::after{content:'';display:block;width:40px;height:1px;
  background:var(--accent-dim);margin:18px auto 0}
#candle-years{font-size:.82rem;letter-spacing:.16em;color:var(--text-muted);margin-top:18px}
#candle-memory{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.6rem;color:var(--accent);margin-top:34px;letter-spacing:.02em}

/* ══ VIEWER (lightbox) ══════════════════════════════════════════════════════ */
#slideshow-view{
  position:fixed;inset:0;background:#16120f;z-index:100;overflow:hidden;
  --vtop-calm:calc(38px + env(safe-area-inset-top));
  --vbot-calm:calc(40px + env(safe-area-inset-bottom));
  --vtop:calc(46px + env(safe-area-inset-top));
  --vbot:calc(140px + env(safe-area-inset-bottom))
}

/* Warm, defocused copy of the current photo fills the side-bars */
#v-backdrop{position:absolute;inset:0;z-index:0;background-size:cover;
  background-position:center;transform:scale(1.1);filter:blur(48px);will-change:background-image}
#v-tint{position:absolute;inset:0;z-index:0;pointer-events:none;background:rgba(22,18,15,.42)}
/* iOS/WebKit: mix-blend-mode на #atmo псувало композитинг сусіднього
   position:fixed #slideshow-view — фон малювався, а діти (фото/текст) НІ →
   чорний екран при відкритті епохи (лише на iPhone; десктоп ок). Фікс — сховати
   #atmo на мобільних (декоративне зерно, opacity .04, непомітне). Перевірено на
   реальному iPhone. Розмитий фон лишаємо, але легшим (blur 24px замість 48px) —
   менше навантаження на мобільний GPU. */
@media (max-width:820px){
  #atmo{display:none !important}
  #v-backdrop{filter:blur(24px)}
}

/* Stage occupies ONLY the region between the top zone and the dock zone, so the
   photo never enters the chrome and a click beside it = close. Calm → photo big;
   active (.chrome) → photo shrinks to clear the dock (smooth). */
#stage{position:absolute;left:0;right:0;top:var(--vtop-calm);bottom:var(--vbot-calm);
  z-index:1;transition:top 280ms ease,bottom 280ms ease}
#slideshow-view.chrome #stage{top:var(--vtop);bottom:var(--vbot)}
.slide{position:absolute;inset:0;opacity:0;display:flex;align-items:center;
  justify-content:center;padding:0 8px;transition:opacity 320ms ease;pointer-events:none}
.slide.active{opacity:1;z-index:2}
.slide img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;
  display:block;box-shadow:0 16px 56px rgba(0,0,0,.5)}
.slide video{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;
  display:none;border-radius:2px;box-shadow:0 16px 56px rgba(0,0,0,.5)}
.slide.is-video img{display:none}
.slide.is-video video{display:block}
.slide.is-video{pointer-events:auto}   /* щоб контроли відео були клікабельні (звичайні слайди — none) */

/* Epoch name — quiet, always visible (calm + active) */
#v-epochname{position:absolute;top:0;left:0;right:0;z-index:6;text-align:center;
  pointer-events:none;font-family:'Playfair Display',serif;font-style:italic;font-weight:400;
  font-size:13px;letter-spacing:.04em;color:var(--text);
  padding:calc(16px + env(safe-area-inset-top)) 64px 30px;
  text-shadow:0 1px 14px rgba(0,0,0,.7);
  background:linear-gradient(to bottom,rgba(22,18,15,.5),transparent);transition:font-size 250ms}
#slideshow-view.chrome #v-epochname{font-size:12.5px}

/* Top bar — active only */
#v-top{position:absolute;top:0;left:0;right:0;z-index:8;display:flex;
  align-items:center;justify-content:space-between;
  padding:calc(12px + env(safe-area-inset-top)) 14px 12px;
  opacity:0;pointer-events:none;transition:opacity 250ms ease}
#slideshow-view.chrome #v-top{opacity:1;pointer-events:auto}
#v-topright{display:flex;align-items:center;gap:8px}

/* Glass chips */
.chip{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:rgba(245,244,240,.14);backdrop-filter:blur(8px);
  border:1px solid rgba(245,244,240,.22);border-radius:10px;color:var(--text);cursor:pointer;
  font-family:'Manrope',sans-serif;transition:background 200ms,border-color 200ms,opacity 200ms}
.chip:hover{background:rgba(245,244,240,.22)}
.chip svg{pointer-events:none;display:block}
.chip::before{content:'';position:absolute;inset:-8px}   /* ≥44px touch target */
#back-btn{height:28px;padding:0 12px;font-size:11px;letter-spacing:.06em}
.chip.ico{width:28px;height:28px;padding:0}
.chip:disabled{opacity:.3;cursor:default;pointer-events:none}

/* Bottom dock — gradient only when chrome is up; in calm the photo shows clean */
#v-dock{position:absolute;left:0;right:0;bottom:0;z-index:7;pointer-events:none;
  padding:10px 16px calc(12px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;align-items:center;gap:8px;
  background:transparent;transition:background 250ms}
#slideshow-view.chrome #v-dock{
  background:linear-gradient(to top,rgba(22,18,15,.86) 0%,rgba(22,18,15,.5) 60%,transparent 100%)}

/* Order top→bottom: controls · thumbs (transient) · epoch bar · counter (persistent) */
#controls,#v-thumbwrap{opacity:0;transition:opacity 250ms ease;pointer-events:none}
#slideshow-view.chrome #controls,
#slideshow-view.chrome #v-thumbwrap{opacity:1;pointer-events:auto}
#controls{display:flex;align-items:center;gap:14px}
#v-thumbwrap{width:100%;max-width:560px;
  -webkit-mask-image:linear-gradient(to right,transparent,#000 12%,#000 88%,transparent);
  mask-image:linear-gradient(to right,transparent,#000 12%,#000 88%,transparent)}
#v-thumbs{display:flex;gap:4px;justify-content:center;align-items:flex-end;overflow:hidden;padding:2px 0}

/* Epoch divider bar + counter — persistent (visible in calm) */
#v-epochbar{display:flex;width:100%;max-width:560px;gap:3px;height:3px;
  pointer-events:auto;cursor:pointer}
.eseg{position:relative;height:3px;border-radius:2px;background:rgba(245,244,240,.16);
  overflow:hidden;min-width:5px}
.eseg.past{background:var(--accent-dim)}
.eseg .efill{position:absolute;inset:0 auto 0 0;width:0;background:var(--accent);
  border-radius:2px;transition:width 280ms ease}
#v-counter{font-size:10.5px;letter-spacing:.06em;color:var(--text-muted);
  font-variant-numeric:tabular-nums;text-shadow:0 1px 8px rgba(0,0,0,.6)}

/* Controls — navigation visually stronger than play */
.c-btn{position:relative;border-radius:50%;border:1px solid rgba(245,244,240,.22);
  background:rgba(245,244,240,.14);backdrop-filter:blur(8px);color:var(--text);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background 200ms,border-color 200ms,opacity 200ms}
.c-btn:hover{background:rgba(245,244,240,.24)}
.c-btn svg{pointer-events:none}
.c-btn::before{content:'';position:absolute;inset:-9px}   /* ≥44px touch target */
.c-btn.nav{width:30px;height:30px}
.c-btn.play{width:22px;height:22px;border-color:rgba(245,244,240,.16);
  background:rgba(245,244,240,.09);color:var(--text-muted)}
.c-btn.play:hover{color:var(--text)}
.c-btn.play::before{inset:-11px}
.c-btn:disabled{opacity:.28;cursor:default;pointer-events:none}

/* Windowed thumbnails + epoch-boundary marker */
.vthumb{width:34px;height:46px;object-fit:cover;border-radius:3px;cursor:pointer;flex-shrink:0;
  opacity:.5;transition:opacity 180ms;background:var(--surface-2)}
.vthumb:hover{opacity:.85}
.vthumb.on{opacity:1;outline:1.5px solid var(--accent);outline-offset:1px}
.vbound{position:relative;flex-shrink:0;width:1px;align-self:stretch;
  background:var(--accent);opacity:.5;margin:0 4px}
.vbound::after{content:attr(data-ep);position:absolute;bottom:100%;left:50%;
  transform:translateX(-50%);margin-bottom:2px;font-family:'Playfair Display',serif;
  font-style:italic;font-size:8.5px;color:var(--accent);white-space:nowrap}

/* Load bar — transient background-loading indicator */
#load-bar{position:absolute;top:0;left:0;right:0;height:2px;background:transparent;
  z-index:9;overflow:hidden;transition:opacity 600ms}
#lb-fill{height:100%;background:var(--accent);width:0%;transition:width 200ms}

/* Solo (1 photo) — hide navigation chrome */
#slideshow-view.solo #controls,
#slideshow-view.solo #v-thumbwrap,
#slideshow-view.solo #v-epochbar,
#slideshow-view.solo #v-counter{display:none!important}

/* ══ GRID OVERLAY (all photos by epoch) ════════════════════════════════════ */
#grid-view{position:fixed;inset:0;background:#16120f;z-index:150;overflow-y:auto;display:none}
#grid-view.show{display:block}
#grid-bar{position:sticky;top:0;z-index:2;display:flex;align-items:center;justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top)) 18px 14px;
  background:rgba(22,18,15,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
#grid-title{font-family:'Playfair Display',serif;font-style:italic;font-size:1.15rem;color:var(--text)}
#grid-body{padding:8px 18px 60px}
.grid-section{font-family:'Playfair Display',serif;font-style:italic;font-size:1.4rem;color:var(--text);
  margin:26px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.grid-section span{font-family:'Manrope',sans-serif;font-style:normal;font-size:.68rem;
  letter-spacing:.12em;color:var(--text-muted);margin-left:9px}
.grid-cols{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.gcell{position:relative;aspect-ratio:3/4;overflow:hidden;border-radius:3px;cursor:pointer;
  background:var(--surface-2);outline:2px solid transparent;outline-offset:-2px;transition:outline-color 160ms}
.gcell img{width:100%;height:100%;object-fit:cover;filter:grayscale(.12);transition:transform 400ms,filter 300ms}
.gcell:hover img{transform:scale(1.05);filter:grayscale(0)}
.gcell:focus-visible{outline:2px solid var(--accent)}
.gcell.here{outline-color:var(--accent)}
.gcell.here::after{content:'ви тут';position:absolute;bottom:6px;left:6px;
  font-family:'Manrope',sans-serif;font-size:.6rem;letter-spacing:.06em;color:#16120f;
  background:var(--accent);padding:2px 7px;border-radius:9px}
@media(max-width:600px){.grid-cols{grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:6px}}

/* Mobile viewer */
@media(max-width:600px){
  #slideshow-view{--vtop-calm:calc(36px + env(safe-area-inset-top));--vbot-calm:calc(42px + env(safe-area-inset-bottom));--vtop:calc(44px + env(safe-area-inset-top));--vbot:calc(146px + env(safe-area-inset-bottom))}
  .c-btn.nav{width:36px;height:36px}
  .c-btn.play{width:24px;height:24px}
  #v-epochname{font-size:12px}
  #slideshow-view.chrome #v-epochname{font-size:11.5px}
}

/* Focus visibility (keyboard) */
.epoch:focus-visible,.face:focus-visible,.thumb:focus-visible,button:focus-visible{
  outline:2px solid var(--accent);outline-offset:3px
}

/* ══ REVIEW / CULL MODE ═════════════════════════════════════════════════════ */
#review-open{
  position:absolute;top:18px;right:24px;z-index:10;height:32px;
  display:inline-flex;align-items:center;gap:7px;padding:0 14px;
  background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:20px;
  color:var(--text-muted);font-family:'Manrope',sans-serif;font-size:.74rem;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  transition:color 200ms,border-color 200ms
}
#review-open:hover{color:var(--accent);border-color:var(--accent-dim)}
#review-open svg{width:14px;height:14px}

#review-view{position:fixed;inset:0;background:var(--bg);overflow-y:auto;z-index:200}
#review-bar{
  position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:14px;
  padding:14px 24px;background:rgba(10,10,10,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);flex-wrap:wrap
}
#review-heading{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.25rem;color:var(--text)}
#review-count{font-size:.8rem;color:var(--text-muted);letter-spacing:.04em;margin-left:auto}
#review-bar button{
  height:32px;padding:0 14px;border-radius:20px;cursor:pointer;
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  color:var(--text);font-family:'Manrope',sans-serif;font-size:.76rem;
  letter-spacing:.05em;transition:background 200ms,border-color 200ms,color 200ms
}
#review-bar button:hover{background:rgba(0,0,0,.7);border-color:rgba(255,255,255,.3)}
#review-copy{color:var(--accent);border-color:var(--accent-dim)!important}
#review-copy:hover{background:var(--accent);color:#0a0a0a}
#review-list{
  display:none;width:calc(100% - 48px);margin:12px 24px 0;height:72px;resize:vertical;
  background:var(--surface);color:var(--text-muted);border:1px solid var(--border);
  border-radius:4px;padding:8px 10px;font-family:ui-monospace,Menlo,monospace;
  font-size:.74rem;line-height:1.5
}
#review-list.show{display:block}
#review-grid{padding:8px 24px 60px}
.review-section{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.5rem;
  color:var(--text);margin:28px 0 12px;padding-bottom:8px;
  border-bottom:1px solid var(--border)
}
.review-cols{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px
}
.review-cell{
  position:relative;cursor:pointer;border-radius:3px;overflow:hidden;
  background:var(--surface);outline:2px solid transparent;outline-offset:-2px;
  transition:outline-color 180ms
}
.review-cell figure{margin:0}
.review-cell img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;
  transition:opacity 180ms}
.review-name{
  display:block;padding:6px 8px;font-size:.66rem;color:var(--text-muted);
  letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.review-mark{

  box-shadow:0 2px 6px rgba(0,0,0,.5)
}
.review-cell.marked{outline-color:var(--del)}
.review-cell.marked img{opacity:.4}

.review-cell.marked .review-name{color:var(--del)}
#review-toast{

  background:rgba(0,0,0,.85);backdrop-filter:blur(8px);border:1px solid var(--border);

@media(max-width:600px){

#cat-open{
  position:absolute;top:18px;left:24px;z-index:10;height:32px;
  display:inline-flex;align-items:center;gap:7px;padding:0 14px;
  background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:20px;
  color:var(--text-muted);font-family:'Manrope',sans-serif;font-size:.74rem;
  letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
  transition:color 200ms,border-color 200ms
}
#cat-open:hover{color:var(--accent);border-color:var(--accent-dim)}
#cat-open svg{width:14px;height:14px}

#cat-view{position:fixed;inset:0;background:var(--bg);overflow-y:auto;z-index:200}
#cat-bar{
  position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:12px;
  padding:14px 24px;background:rgba(10,10,10,.94);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);flex-wrap:wrap
}
#cat-heading{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.25rem;color:var(--text)}
#cat-count{font-size:.8rem;color:var(--text-muted);letter-spacing:.04em}
#cat-bar .spacer{margin-left:auto}
#cat-bar button{
  height:32px;padding:0 14px;border-radius:20px;cursor:pointer;
  background:rgba(0,0,0,.4);border:1px solid var(--border);
  color:var(--text);font-family:'Manrope',sans-serif;font-size:.76rem;
  letter-spacing:.05em;transition:background 200ms,border-color 200ms,color 200ms
}
#cat-bar button:hover{background:rgba(0,0,0,.7);border-color:rgba(255,255,255,.3)}
#cat-copy{color:var(--accent);border-color:var(--accent-dim)!important}
#cat-copy:hover{background:var(--accent);color:#0a0a0a}
#cat-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  width:100%;padding:12px 24px 0}
.cat-chip{
  height:30px;padding:0 13px;border-radius:18px;cursor:pointer;
  background:var(--surface-2);border:1px solid var(--border);color:var(--text);
  font-family:'Manrope',sans-serif;font-size:.78rem;letter-spacing:.02em;
  transition:background 160ms,border-color 160ms,color 160ms
}
.cat-chip:hover{border-color:var(--accent-dim);color:var(--accent)}
.cat-chip.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
#cat-newinput{
  height:30px;padding:0 12px;border-radius:18px;width:170px;
  background:var(--surface);border:1px dashed var(--accent-dim);color:var(--text);
  font-family:'Manrope',sans-serif;font-size:.78rem
}
#cat-newinput::placeholder{color:var(--text-muted)}
#cat-create{
  height:30px;padding:0 12px;border-radius:18px;cursor:pointer;
  background:transparent;border:1px solid var(--accent-dim);color:var(--accent);
  font-family:'Manrope',sans-serif;font-size:.78rem
}
#cat-create:hover{background:var(--accent);color:#0a0a0a}
#cat-list{
  display:none;width:calc(100% - 48px);margin:12px 24px 0;height:80px;resize:vertical;
  background:var(--surface);color:var(--text-muted);border:1px solid var(--border);
  border-radius:4px;padding:8px 10px;font-family:ui-monospace,Menlo,monospace;
  font-size:.74rem;line-height:1.5
}
#cat-list.show{display:block}
#cat-hint{padding:8px 24px 0;font-size:.74rem;color:var(--text-muted)}
#cat-grid{padding:8px 24px 60px}
.cat-section{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.5rem;
  color:var(--text);margin:26px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)
}
.cat-cols{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.cat-cell{
  position:relative;cursor:pointer;border-radius:3px;overflow:hidden;
  background:var(--surface);outline:2px solid transparent;outline-offset:-2px;
  transition:outline-color 160ms
}
.cat-cell figure{margin:0}
.cat-cell img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;transition:opacity 160ms}
.cat-name{display:block;padding:6px 8px;font-size:.66rem;color:var(--text-muted);
  letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-badge{
  position:absolute;top:7px;left:7px;max-width:calc(100% - 14px);
  padding:3px 8px;border-radius:12px;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  font-size:.62rem;letter-spacing:.02em;color:var(--text-muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.cat-cell.changed .cat-badge{background:var(--accent);color:#0a0a0a}
.cat-cell.changed{outline-color:var(--accent-dim)}
.cat-cell.selected{outline-color:var(--accent)}
.cat-cell.selected img{opacity:.7}
.cat-check{
  position:absolute;bottom:30px;right:7px;width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:#0a0a0a;display:none;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.5)
}
.cat-cell.selected .cat-check{display:flex}
@media(max-width:600px){
  #cat-grid{padding:8px 14px 60px}
  .cat-cols{grid-template-columns:repeat(2,1fr)}
  #cat-chips,#cat-hint{padding-left:14px;padding-right:14px}
  #cat-list{width:calc(100% - 28px);margin-left:14px;margin-right:14px}
}

/* Mobile */
@media(max-width:600px){

}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  .slide{transition:opacity 200ms ease!important;transform:none!important}
  .slide.active{transform:none!important}

}

:fullscreen #thumb-strip,:-webkit-full-screen #thumb-strip{display:none}

function buildIcon(title) {
  const spec = ICONS[title] || ICONS._default;
  if (!spec) return null;
  const svg = document.createElementNS(SVGNS, 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('stroke-width', '1.5');
  svg.setAttribute('stroke-linecap', 'round');
  svg.setAttribute('stroke-linejoin', 'round');
  svg.setAttribute('class', 'card-icon');
  spec.forEach(([tag, attrs]) => {
    const el = document.createElementNS(SVGNS, tag);
    for (const k in attrs) el.setAttribute(k, attrs[k]);
    svg.appendChild(el);
  });
  return svg;
}

/* ═══ LANDING (наратив: епохи + «Обличчя») ═══════════════════════════════════ */
function altOf(name) { return (name || '').replace(/-/g, ' ').trim(); }

function buildLanding() {
  const epochs = GROUPS.filter(g => g.kind !== 'faces');
  const faces  = GROUPS.find(g => g.kind === 'faces');

  /* — Епохи як вертикальні смуги — */
  epochsEl.textContent = '';
  epochs.forEach((g, i) => {
    const gi = GROUPS.indexOf(g);
    const band = document.createElement('div');
    band.className = 'epoch' + (g.title.indexOf('Азов') > -1 ? ' lg' : '');
    band.tabIndex = 0;
    band.setAttribute('role', 'button');
    band.setAttribute('aria-label', g.title);
    band.style.setProperty('--i', i);

    const img = document.createElement('img');
    img.className = 'epoch-cover';
    img.src = g.cover || g.photos[0].src;
    img.alt = g.title;
    img.loading = 'lazy';
    if (g.coverPos) img.style.objectPosition = g.coverPos;

    const scrim = document.createElement('div');
    scrim.className = 'epoch-scrim';

    const meta = document.createElement('div');
    meta.className = 'epoch-meta';
    const parts = g.title.split('. ');
    const hasNum = parts.length > 1;
    if (hasNum) {
      const num = document.createElement('div');
      num.className = 'epoch-num';
      num.textContent = parts[0] + '.';
      meta.appendChild(num);
    }
    const tt = document.createElement('div');
    tt.className = 'epoch-title';
    tt.textContent = hasNum ? parts.slice(1).join('. ') : g.title;
    meta.appendChild(tt);
    if (g.subtitle) {
      const sub = document.createElement('div');
      sub.className = 'epoch-sub';
      sub.textContent = g.subtitle;
      meta.appendChild(sub);
    }

    band.appendChild(img);
    band.appendChild(scrim);
    band.appendChild(meta);
    const open = () => openGroup(gi);
    band.addEventListener('click', open);
    band.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
    });
    epochsEl.appendChild(band);
  });

  /* — «Обличчя» (студійні портрети) — */
  if (faces && faces.photos.length) {
    const fi = GROUPS.indexOf(faces);
    facesGrid.textContent = '';
    faces.photos.forEach((ph, i) => {
      const cell = document.createElement('div');
      cell.className = 'face';
      cell.tabIndex = 0;
      cell.setAttribute('role', 'button');
      cell.setAttribute('aria-label', altOf(ph.name));
      const img = document.createElement('img');
      img.alt = altOf(ph.name);
      img.dataset.src = ph.thumb || ph.src;
      img.loading = 'lazy';
      const open = () => openGroup(fi, i);
      cell.addEventListener('click', open);
      cell.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
      });
      cell.appendChild(img);
      facesGrid.appendChild(cell);
      thumbObs.observe(img);
    });
  } else {
    const fb = document.getElementById('faces-block');
    if (fb) fb.style.display = 'none';
  }

  /* — «Пройти все життя» (епохи I→III поспіль) — */
  walkAllBtn.addEventListener('click', () => openLife());
}

/* ═══ OPEN / CLOSE (slideshow / lightbox) ═══════════════════════════════════ */
function cleanTitle(t){ const p=(t||'').split('. '); return p.length>1?p.slice(1).join('. '):(t||''); }
function segIndexAt(i){
  for(let k=0;k<activeEpochs.length;k++){
    const s=activeEpochs[k];
    if(i>=s.start && i<s.start+s.count) return k;
  }
  return 0;
}

/* ═══ THUMBNAIL OBSERVER (lazy) ══════════════════════════════════════════════ */
const thumbObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const t = e.target;
      if (t.dataset.src) { t.src = t.dataset.src; delete t.dataset.src; }
      thumbObs.unobserve(t);
    }
  });
}, { threshold: 0.1 });

/* ═══ OPEN / CLOSE ═══════════════════════════════════════════════════════════ */
function openSlides(photos, epochs, start){
  if(!photos || !photos.length) return;
  activePhotos = photos;
  activeEpochs = (epochs && epochs.length) ? epochs : [{title:'', start:0, count:photos.length}];
  slideOpen = true;
  cur = start || 0;

  const solo = photos.length <= 1;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  playing = !solo && !reduce;            // автоплей стартує сам (крім 1 фото / reduced-motion)
  reflectPlay();                          // синхронізує іконки play/pause + aria

  slideshowView.classList.toggle('solo', solo);
  groupsView.classList.add('hidden');
  slideshowView.classList.remove('hidden');

  buildEpochBar();
  initSlides(cur);                        // → syncPlayback() стартує автоплей / відео
  showChrome();
  loadAsync();
}
function openGroup(gi, start){
  activeGrp = gi;
  const g = GROUPS[gi];
  openSlides(g.photos, [{title:cleanTitle(g.title), start:0, count:g.photos.length}], start || 0);
}
function openList(photos, title){        // сумісність: один синтетичний список
  activeGrp = -1;
  openSlides(photos, [{title:cleanTitle(title||''), start:0, count:photos.length}], 0);
}
function openLife(){                      // «Пройти все життя» — епохи I→III поспіль
  activeGrp = -1;
  const eps = GROUPS.filter(g => g.kind !== 'faces');
  const photos = [], segs = []; let off = 0;
  eps.forEach(g => {
    if(!g.photos.length) return;
    segs.push({title:cleanTitle(g.title), start:off, count:g.photos.length});
    g.photos.forEach(p => photos.push(p));
    off += g.photos.length;
  });
  openSlides(photos, segs, 0);
}
function goBack(){
  stopAuto();
  pauseSlotVideos();                      // зупинити звук відео при закритті
  loadToken++;                            // скасувати фонове довантаження
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  slideshowView.classList.add('hidden');
  slideshowView.classList.remove('solo','chrome');
  groupsView.classList.remove('hidden');
  activeGrp = null; slideOpen = false; activePhotos = []; activeEpochs = [];
  lbFill.style.width = '0%'; loadBar.style.opacity = '0';
  vThumbs.textContent = ''; vEpochBar.textContent = '';
}

/* ═══ SLIDES (3-slot virtual DOM, non-circular) ═════════════════════════════ */
function slotImg(si){ return slots[si].querySelector('img'); }
function slotVid(si){ return slots[si].querySelector('video'); }
function setSlotSrc(si, idx){
  const slot = slots[si], img = slotImg(si), vid = slotVid(si);
  const it = (idx >= 0 && idx < activePhotos.length) ? activePhotos[idx] : null;
  if(vid){ vid.pause(); vid.removeAttribute('src'); vid.replaceChildren(); }
  if(it && it.video){
    slot.classList.add('is-video');
    img.removeAttribute('src'); img.alt = '';
    vid.poster = it.src;
    vid.setAttribute('aria-label', altOf(it.name));
    const s = document.createElement('source');   // <source> — як у свічки (надійніше за .src для data-URI)
    s.src = it.video; s.type = 'video/mp4';
    vid.appendChild(s);
    try { vid.load(); } catch(e){}
  } else if(it){
    slot.classList.remove('is-video');
    img.src = it.src;
    img.alt = altOf(it.name);
  } else {
    slot.classList.remove('is-video');
    img.removeAttribute('src'); img.alt = '';
  }
}
function pauseSlotVideos(){ slots.forEach(s => { const v = s.querySelector('video'); if(v) v.pause(); }); }
function playActiveVideo(){
  const act = slots[arr[1]];
  const v = act && act.querySelector('video');
  if(!act || !act.classList.contains('is-video') || !v) return;
  stopAuto();                          // фото-автоплей паузиться, поки грає відео
  try { v.currentTime = 0; } catch(e){}
  v.muted = false;
  const p = v.play();
  if(p && p.catch) p.catch(() => { v.muted = true; v.play().catch(()=>{}); });  // фолбек: без звуку
}
function syncPlayback(){
  pauseSlotVideos();
  const it = activePhotos[cur];
  if(it && it.video){ stopAuto(); playActiveVideo(); }
  else if(playing){ restartAuto(); }
  else { stopAuto(); }
}
function initSlides(idx){
  arr = [0, 1, 2];
  setSlotSrc(0, idx - 1);
  setSlotSrc(1, idx);
  setSlotSrc(2, idx + 1);
  slots[0].classList.remove('active');
  slots[1].classList.add('active');
  slots[2].classList.remove('active');
  cur = idx;
  refreshHUD();
  syncPlayback();
}
function navigate(dir){
  const n = activePhotos.length;
  const ni = cur + dir;
  if(ni < 0 || ni >= n) return;           // non-circular: зупинка на краях
  if(dir > 0){
    const freed = arr[0];
    setSlotSrc(freed, ni + 1);
    arr = [arr[1], arr[2], freed];
  } else {
    const freed = arr[2];
    setSlotSrc(freed, ni - 1);
    arr = [freed, arr[0], arr[1]];
  }
  slots[arr[0]].classList.remove('active');
  slots[arr[1]].classList.add('active');
  slots[arr[2]].classList.remove('active');
  cur = ni;
  refreshHUD();
  syncPlayback();
}
function jumpTo(idx){
  if(idx === cur || idx < 0 || idx >= activePhotos.length){ showChrome(); return; }
  initSlides(idx);
  showChrome();
}

/* ═══ HUD (epoch name · caption · counter · epoch bar · thumbs · backdrop) ═══ */
function refreshHUD(){
  const ph = activePhotos[cur];
  if(ph) vBackdrop.style.backgroundImage = 'url("' + ph.src + '")';

  const k = segIndexAt(cur);
  const seg = activeEpochs[k] || {title:'', start:0, count:activePhotos.length};
  const inEp = cur - seg.start + 1;
  vEpochName.textContent = seg.title || '';
  vCounter.textContent = (activeEpochs.length > 1)
    ? ((cur+1) + ' / ' + activePhotos.length + ' · ' + inEp + ' / ' + seg.count + ' в епосі')
    : ((cur+1) + ' / ' + activePhotos.length);

  btnPrev.disabled = (cur <= 0);
  btnNext.disabled = (cur >= activePhotos.length - 1);

  updateEpochBar(k, inEp, seg.count);
  buildThumbWindow();
}

/* ═══ EPOCH DIVIDER BAR (coarse navigation) ═════════════════════════════════ */
function buildEpochBar(){
  vEpochBar.textContent = '';
  if(activePhotos.length <= 1) return;
  activeEpochs.forEach((s) => {
    const seg = document.createElement('div');
    seg.className = 'eseg';
    seg.style.flexGrow = s.count;
    seg.title = s.title;
    seg.setAttribute('role', 'button');
    seg.setAttribute('aria-label', 'Перейти до епохи: ' + s.title);
    const fill = document.createElement('div'); fill.className = 'efill';
    seg.appendChild(fill);
    seg.addEventListener('click', () => jumpTo(s.start));
    vEpochBar.appendChild(seg);
  });
}
function updateEpochBar(k, inEp, count){
  const segs = vEpochBar.children;
  for(let i=0;i<segs.length;i++){
    const fill = segs[i].querySelector('.efill');
    segs[i].classList.toggle('past', i < k);
    if(i < k) fill.style.width = '100%';
    else if(i > k) fill.style.width = '0%';
    else fill.style.width = (count ? Math.round(inEp / count * 100) : 0) + '%';
  }
}

/* ═══ WINDOWED THUMBNAILS (fine navigation; ~15, edges fade) ════════════════ */
const WIN = 15;
function buildThumbWindow(){
  vThumbs.textContent = '';
  const n = activePhotos.length;
  if(n <= 1) return;
  const half = Math.floor(WIN / 2);
  let start = (n < WIN) ? 0 : Math.max(0, Math.min(cur - half, n - WIN));
  const end = Math.min(n, start + WIN);
  for(let i=start;i<end;i++){
    const k = segIndexAt(i);
    if(i > start && activeEpochs.length > 1 && activeEpochs[k] && activeEpochs[k].start === i){
      const b = document.createElement('div');
      b.className = 'vbound';
      b.setAttribute('data-ep', activeEpochs[k].title || '');
      vThumbs.appendChild(b);
    }
    const ph = activePhotos[i];
    const img = document.createElement('img');
    img.className = 'vthumb' + (i === cur ? ' on' : '');
    img.src = ph.thumb || ph.src;
    img.alt = altOf(ph.name);
    img.addEventListener('click', () => jumpTo(i));
    vThumbs.appendChild(img);
  }
}

/* ═══ AUTOPLAY (on by default ~6s; off for solo / reduced-motion; stops at last) ══ */
function startAuto(){
  stopAuto();
  if(!playing) return;
  if(activePhotos[cur] && activePhotos[cur].video) return;   // на відео-кадрі фото-таймер не крутимо (його веде 'ended')
  autoTimer = setInterval(() => {
    if(cur >= activePhotos.length - 1){ playing = false; reflectPlay(); stopAuto(); return; }
    navigate(1);
  }, DUR);
}
function stopAuto(){ clearInterval(autoTimer); autoTimer = null; }
function restartAuto(){ stopAuto(); if(playing) startAuto(); }
function reflectPlay(){
  icPlay.classList.toggle('hidden', playing);
  icPause.classList.toggle('hidden', !playing);
  btnPlay.setAttribute('aria-label', playing ? 'Слайдшоу: пауза' : 'Слайдшоу: відтворити');
}
function togglePlay(){
  playing = !playing;
  reflectPlay();
  if(!playing){ stopAuto(); pauseSlotVideos(); showChrome(); return; }
  if(cur >= activePhotos.length - 1) initSlides(0);   // з початку; syncPlayback заведе відтворення
  else syncPlayback();                                // продовжити поточний кадр (фото-таймер / відео)
  showChrome();
}

/* ═══ CHROME VISIBILITY (calm ↔ active, auto-hide ~3s) ══════════════════════ */
function showChrome(){
  slideshowView.classList.add('chrome');
  clearTimeout(chromeTimer);
  chromeTimer = setTimeout(hideChrome, 3000);
}
function hideChrome(){ slideshowView.classList.remove('chrome'); }
function toggleChrome(){ if(slideshowView.classList.contains('chrome')) hideChrome(); else showChrome(); }
stage.addEventListener('mousemove', showChrome);

/* ═══ PROGRESSIVE LOADING ═══════════════════════════════════════════════════ */
function loadAsync(){
  const my = ++loadToken;
  const ph = activePhotos;
  const total = ph.length;
  if(total <= 1) return;
  let done = 1;
  loadBar.style.opacity = '1';
  lbFill.style.width = (100 / total) + '%';
  let i = 1;
  function step(){
    if(my !== loadToken || i >= total){
      lbFill.style.width = '100%';
      setTimeout(() => { loadBar.style.opacity = '0'; }, 800);
      return;
    }
    const img = new Image();
    img.onload = img.onerror = () => {
      done++; lbFill.style.width = (done / total * 100) + '%';
      i++; setTimeout(step, 25);
    };
    img.src = ph[i].src;
  }
  if('requestIdleCallback' in window) requestIdleCallback(() => step());
  else setTimeout(step, 200);
}

/* ═══ FULLSCREEN ════════════════════════════════════════════════════════════ */
function toggleFS(){
  // iOS WebKit не має Element.requestFullscreen → виклик кинув би виняток. Захищаємось.
  try{
    if(!document.fullscreenElement && slideshowView.requestFullscreen){
      slideshowView.requestFullscreen().catch(()=>{});
    } else if(document.fullscreenElement && document.exitFullscreen){
      document.exitFullscreen().catch(()=>{});
    }
  }catch(e){}
}

/* ═══ CLICK ZONES (mouse) + SWIPE / TAP (touch) ═════════════════════════════ */
function activeImgRect(){
  const img = slotImg(arr[1]);
  if(!img || !img.naturalWidth) return null;
  const cw = img.clientWidth, ch = img.clientHeight;
  const nr = img.naturalWidth / img.naturalHeight, cr = cw / ch;
  let w, h;
  if(nr > cr){ w = cw; h = cw / nr; } else { h = ch; w = ch * nr; }
  const r = img.getBoundingClientRect();
  const x = r.left + (cw - w) / 2, y = r.top + (ch - h) / 2;
  return { left:x, top:y, right:x + w, bottom:y + h, width:w, height:h };
}
stage.addEventListener('click', e => {
  if(isTouch){ isTouch = false; return; }      // touch обробляється окремо
  if(slots[arr[1]] && slots[arr[1]].classList.contains('is-video')) return;  // відео — керується власними контролами
  const rect = activeImgRect();
  if(!rect){ goBack(); return; }
  if(e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom){
    goBack(); return;                           // клік повз фото = закрити
  }
  const rel = (e.clientX - rect.left) / rect.width;
  if(rel < 0.34) navigate(-1);
  else if(rel > 0.66) navigate(1);
  else toggleChrome();
});
let tx = 0, ty = 0, tmoved = false;
stage.addEventListener('touchstart', e => {
  isTouch = true; tx = e.touches[0].clientX; ty = e.touches[0].clientY; tmoved = false;
}, { passive:true });
stage.addEventListener('touchmove', e => {
  if(Math.abs(e.touches[0].clientX - tx) > 10 || Math.abs(e.touches[0].clientY - ty) > 10) tmoved = true;
}, { passive:true });
stage.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
  if(Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)) navigate(dx > 0 ? -1 : 1);
  else if(!tmoved) toggleChrome();
}, { passive:true });

/* ═══ KEYBOARD ══════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if(gridOpen){ if(e.key === 'Escape') closeGrid(); return; }
  if(reviewOpen){ if(e.key === 'Escape') closeReview(); return; }
  if(catOpen){ if(e.key === 'Escape') closeCat(); return; }
  if(!slideOpen) return;
  if(e.key === 'ArrowLeft')       navigate(-1);
  else if(e.key === 'ArrowRight') navigate(1);
  else if(e.key === ' '){ e.preventDefault(); togglePlay(); }
  else if(e.key === 'Escape'){ if(document.fullscreenElement) document.exitFullscreen().catch(()=>{}); else goBack(); }
  else if(e.key === 'f' || e.key === 'F') toggleFS();
});

/* ═══ GRID OVERLAY (all photos by epoch) ════════════════════════════════════ */
function buildGrid(){
  gridBody.textContent = '';
  const curName = activePhotos[cur] ? activePhotos[cur].name : null;
  GROUPS.forEach(g => {
    if(!g.photos.length) return;
    const h = document.createElement('h2'); h.className = 'grid-section';
    h.textContent = cleanTitle(g.title);
    const cnt = document.createElement('span'); cnt.textContent = g.photos.length; h.appendChild(cnt);
    gridBody.appendChild(h);
    const cols = document.createElement('div'); cols.className = 'grid-cols';
    const gi = GROUPS.indexOf(g);
    g.photos.forEach((ph, idx) => {
      const cell = document.createElement('div');
      cell.className = 'gcell' + (ph.name === curName ? ' here' : '');
      cell.tabIndex = 0; cell.setAttribute('role', 'button'); cell.setAttribute('aria-label', altOf(ph.name));
      const img = document.createElement('img');
      img.alt = altOf(ph.name); img.dataset.src = ph.thumb || ph.src; img.loading = 'lazy';
      cell.appendChild(img);
      const go = () => { closeGrid(); openGroup(gi, idx); };
      cell.addEventListener('click', go);
      cell.addEventListener('keydown', ev => { if(ev.key === 'Enter' || ev.key === ' '){ ev.preventDefault(); go(); } });
      cols.appendChild(cell);
      thumbObs.observe(img);
    });
    gridBody.appendChild(cols);
  });
}
function openGrid(){
  stopAuto();
  pauseSlotVideos();                      // зупинити звук відео при відкритті сітки
  gridOpen = true;
  buildGrid();
  gridView.classList.add('show');
  gridView.scrollTop = 0;
  const here = gridBody.querySelector('.gcell.here');
  if(here) here.scrollIntoView({ block:'center' });
}
function closeGrid(){ gridOpen = false; gridView.classList.remove('show'); }

/* ═══ BUTTONS ═══════════════════════════════════════════════════════════════ */
btnPrev.addEventListener('click', () => navigate(-1));
btnNext.addEventListener('click', () => navigate(1));
btnPlay.addEventListener('click', togglePlay);
backBtn.addEventListener('click', goBack);
fsBtn.addEventListener('click', toggleFS);
gridBtn.addEventListener('click', openGrid);
gridClose.addEventListener('click', closeGrid);
document.addEventListener('fullscreenchange', () => showChrome());

/* ═══ INIT ═════════════════════════════════════════════════════════════════ */
/* ═══ REVIEW / CULL MODE ════════════════════════════════════════════════════ */
let reviewOpen = false;
const REVIEW_KEY = 'kyrylo_marked';
const marked = new Set(JSON.parse(localStorage.getItem(REVIEW_KEY) || '[]'));
const reviewView  = document.getElementById('review-view');
const reviewGrid  = document.getElementById('review-grid');
const reviewCount = document.getElementById('review-count');
const reviewList  = document.getElementById('review-list');
const reviewToast = document.getElementById('review-toast');

function persistMarks() {
  localStorage.setItem(REVIEW_KEY, JSON.stringify([...marked]));
}

function refreshReview() {
  reviewCount.textContent = 'Позначено: ' + marked.size;
  reviewList.value = [...marked].join('\n');
  reviewList.classList.toggle('show', marked.size > 0);
}

function buildReview() {
  reviewGrid.textContent = '';
  GROUPS.forEach(g => {
    const h = document.createElement('h2');
    h.className = 'review-section';
    h.textContent = g.title + '  ·  ' + g.photos.length;
    reviewGrid.appendChild(h);

    const cols = document.createElement('div');
    cols.className = 'review-cols';
    g.photos.forEach(ph => {
      const cell = document.createElement('div');
      cell.className = 'review-cell' + (marked.has(ph.name) ? ' marked' : '');

      const fig = document.createElement('figure');
      const img = document.createElement('img');
      img.alt = '';
      img.dataset.src = ph.thumb || ph.src;
      fig.appendChild(img);

      const cap = document.createElement('figcaption');
      cap.className = 'review-name';
      cap.textContent = ph.name;
      fig.appendChild(cap);

      const badge = document.createElement('div');
      badge.className = 'review-mark';
      badge.textContent = '✕';

      cell.appendChild(fig);
      cell.appendChild(badge);
      cell.addEventListener('click', () => {
        if (marked.has(ph.name)) { marked.delete(ph.name); cell.classList.remove('marked'); }
        else { marked.add(ph.name); cell.classList.add('marked'); }
        persistMarks();
        refreshReview();
      });
      cols.appendChild(cell);
      thumbObs.observe(img);
    });
    reviewGrid.appendChild(cols);
  });
  refreshReview();
}

function openReview() {
  reviewOpen = true;
  groupsView.classList.add('hidden');
  reviewView.classList.remove('hidden');
  buildReview();
  reviewView.scrollTop = 0;
}
function closeReview() {
  reviewOpen = false;
  reviewView.classList.add('hidden');
  groupsView.classList.remove('hidden');
}

function showToast(msg) {
  reviewToast.textContent = msg;
  reviewToast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => reviewToast.classList.remove('show'), 1800);
}

function copyMarks() {
  if (!marked.size) { showToast('Нічого не позначено'); return; }
  const text = [...marked].join('\n');
  const done = () => showToast('Скопійовано: ' + marked.size);
  const fallback = () => { reviewList.classList.add('show'); reviewList.focus(); reviewList.select(); try { document.execCommand('copy'); } catch (e) {} done(); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(fallback);
  } else { fallback(); }
}

function clearMarks() {
  marked.clear();
  persistMarks();
  reviewGrid.querySelectorAll('.review-cell.marked').forEach(c => c.classList.remove('marked'));
  refreshReview();
}

document.getElementById('review-open').addEventListener('click', openReview);
document.getElementById('review-back').addEventListener('click', closeReview);
document.getElementById('review-copy').addEventListener('click', copyMarks);
document.getElementById('review-clear').addEventListener('click', clearMarks);

/* ═══ CATEGORY EDITOR ═══════════════════════════════════════════════════════ */
let catOpen = false;
const CAT_KEY = 'kyrylo_cats';
const NEWCAT_KEY = 'kyrylo_newcats';
const catChanges = new Map(JSON.parse(localStorage.getItem(CAT_KEY) || '[]'));
const newCats = new Set(JSON.parse(localStorage.getItem(NEWCAT_KEY) || '[]'));
const catSelected = new Set();
const catCells = new Map();
let activeChip = null;

const catView  = document.getElementById('cat-view');
const catGrid  = document.getElementById('cat-grid');
const catChips = document.getElementById('cat-chips');
const catCount = document.getElementById('cat-count');
const catList  = document.getElementById('cat-list');

const baseCatOf = {};
GROUPS.forEach(g => g.photos.forEach(p => { baseCatOf[p.name] = g.title; }));
// прибрати застарілі зміни (вже застосовані під час перезбірки)
[...catChanges].forEach(([s2, t]) => {
  if (!(s2 in baseCatOf) || baseCatOf[s2] === t) catChanges.delete(s2);
});

function effectiveCat(stem) {
  return catChanges.has(stem) ? catChanges.get(stem) : baseCatOf[stem];
}
function persistCats() {
  localStorage.setItem(CAT_KEY, JSON.stringify([...catChanges]));
  localStorage.setItem(NEWCAT_KEY, JSON.stringify([...newCats]));
}
function categoryList() {
  const seen = [];
  GROUPS.forEach(g => { if (!seen.includes(g.title)) seen.push(g.title); });
  newCats.forEach(c => { if (!seen.includes(c)) seen.push(c); });
  catChanges.forEach(t => { if (!seen.includes(t)) seen.push(t); });
  return seen;
}
function renderChips() {
  catChips.textContent = '';
  categoryList().forEach(title => {
    const chip = document.createElement('button');
    chip.className = 'cat-chip' + (title === activeChip ? ' active' : '');
    chip.textContent = title;
    chip.addEventListener('click', () => { activeChip = title; assignSelected(title); renderChips(); });
    catChips.appendChild(chip);
  });
  const input = document.createElement('input');
  input.id = 'cat-newinput';
  input.placeholder = '+ нова категорія';
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); doCreate(input); } });
  const create = document.createElement('button');
  create.id = 'cat-create';
  create.textContent = 'Створити';
  create.addEventListener('click', () => doCreate(input));
  catChips.appendChild(input);
  catChips.appendChild(create);
}
function doCreate(input) {
  const name = input.value.trim();
  if (!name) return;
  if (!categoryList().includes(name)) { newCats.add(name); persistCats(); }
  activeChip = name;
  input.value = '';
  if (catSelected.size) assignSelected(name);
  renderChips();
}
function assignSelected(title) {
  if (!catSelected.size) return;
  catSelected.forEach(stem => {
    if (title === baseCatOf[stem]) catChanges.delete(stem);
    else catChanges.set(stem, title);
    const cell = catCells.get(stem);
    if (cell) {
      cell.classList.toggle('changed', catChanges.has(stem));
      cell.classList.remove('selected');
      const badge = cell.querySelector('.cat-badge');
      if (badge) badge.textContent = effectiveCat(stem);
    }
  });
  catSelected.clear();
  persistCats();
  refreshCat();
}
function refreshCat() {
  catCount.textContent = 'Вибрано: ' + catSelected.size + ' · Змінено: ' + catChanges.size;
  catList.value = [...catChanges].map(([st, t]) => st + ' | ' + t).join('\n');
  catList.classList.toggle('show', catChanges.size > 0);
}
function buildCatView() {
  catGrid.textContent = '';
  catCells.clear();
  GROUPS.forEach(g => {
    const h = document.createElement('h2');
    h.className = 'cat-section';
    h.textContent = g.title + '  ·  ' + g.photos.length;
    catGrid.appendChild(h);
    const cols = document.createElement('div');
    cols.className = 'cat-cols';
    g.photos.forEach(ph => {
      const cell = document.createElement('div');
      cell.className = 'cat-cell' + (catChanges.has(ph.name) ? ' changed' : '');
      const fig = document.createElement('figure');
      const img = document.createElement('img');
      img.alt = ''; img.dataset.src = ph.thumb || ph.src;
      fig.appendChild(img);
      const cap = document.createElement('figcaption');
      cap.className = 'cat-name'; cap.textContent = ph.name;
      fig.appendChild(cap);
      const badge = document.createElement('div');
      badge.className = 'cat-badge'; badge.textContent = effectiveCat(ph.name);
      const check = document.createElement('div');
      check.className = 'cat-check'; check.textContent = '✓';
      cell.appendChild(fig); cell.appendChild(badge); cell.appendChild(check);
      cell.addEventListener('click', () => {
        if (catSelected.has(ph.name)) { catSelected.delete(ph.name); cell.classList.remove('selected'); }
        else { catSelected.add(ph.name); cell.classList.add('selected'); }
        refreshCat();
      });
      catCells.set(ph.name, cell);
      cols.appendChild(cell);
      thumbObs.observe(img);
    });
    catGrid.appendChild(cols);
  });
  renderChips();
  refreshCat();
}
function openCat() {
  catOpen = true;
  groupsView.classList.add('hidden');
  catView.classList.remove('hidden');
  catSelected.clear();
  buildCatView();
  catView.scrollTop = 0;
}
function closeCat() {
  catOpen = false;
  catView.classList.add('hidden');
  groupsView.classList.remove('hidden');
}
function copyCats() {
  if (!catChanges.size) { showToast('Немає змін'); return; }
  const text = [...catChanges].map(([st, t]) => st + ' | ' + t).join('\n');
  const done = () => showToast('Скопійовано: ' + catChanges.size);
  const fallback = () => { catList.classList.add('show'); catList.focus(); catList.select(); try { document.execCommand('copy'); } catch (e) {} done(); };
  if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).then(done).catch(fallback);
  else fallback();
}
function clearCats() {
  catChanges.clear();
  persistCats();
  catCells.forEach((cell, stem) => {
    cell.classList.remove('changed');
    const b = cell.querySelector('.cat-badge');
    if (b) b.textContent = baseCatOf[stem];
  });
  refreshCat();
}
document.getElementById('cat-open').addEventListener('click', openCat);
document.getElementById('cat-back').addEventListener('click', closeCat);
document.getElementById('cat-copy').addEventListener('click', copyCats);
document.getElementById('cat-clear').addEventListener('click', clearCats);

buildLanding();
</script>
